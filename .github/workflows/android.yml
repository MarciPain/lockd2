name: Build Android (Flutter)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/lockd2.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lockd2-release-apk
          path: build/app/outputs/flutter-apk/lockd2.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/lockd2.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
